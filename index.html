async function sbFetch(method, path, body) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
    method,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": method === "POST" ? "return=representation" : ""
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  const txt = await res.text();
  return txt ? JSON.parse(txt) : [];
}

async function dbSalvar(registro) {
  const row = formToRow(registro);
  await sbFetch("POST", "atendimentos?on_conflict=id", row);
  return registro;
}

async function dbGetAll() {
  const rows = await sbFetch("GET", "atendimentos?order=criado_em.desc");
  return rows.map(rowToForm);
}

async function dbDeletar(id) {
  await sbFetch("DELETE", "atendimentos?id=eq." + id);
}

async function dbDeletarPaciente(prontuario) {
  await sbFetch("DELETE", "atendimentos?prontuario=eq." + encodeURIComponent(prontuario));
}

async function dbVerificarEmail(email) {
  const rows = await sbFetch("GET", "clientes?email=eq." + encodeURIComponent(email.trim().toLowerCase()) + "&select=*");
  if (!rows || !rows.length) return { ok: false, motivo: "nao_encontrado" };
  const cliente = rows[0];
  if (cliente.ativo === false || cliente.ativo === "false" || cliente.ativo === 0) {
    return { ok: false, motivo: "inativo" };
  }
  if (cliente.validade) {
    const hoje = new Date();
    const validade = new Date(cliente.validade + "T23:59:59");
    if (validade < hoje) return { ok: false, motivo: "expirado", validade: cliente.validade };
  }
  return { ok: true, cliente };
}

async function dbExportar() {
  const todos = await dbGetAll();
  const limpo = todos.map(a => ({...a, fotos: []}));
  return JSON.stringify({versao:"EstomaCare-v4", exportado:new Date().toISOString(), total:todos.length, atendimentos:limpo}, null, 2);
}

const fmtDate = d => d ? new Date(d + "T12:00:00").toLocaleDateString("pt-BR") : "—";
const calcArea = (c, l) => c && l ? (parseFloat(c) * parseFloat(l)).toFixed(1) : null;
const diasTrat = (ini, fim) => {
  if (!ini) return null;
  const d = Math.round((new Date((fim || new Date().toISOString().split("T")[0]) + "T12:00:00") - new Date(ini + "T12:00:00")) / 86400000);
  return d >= 0 ? d : null;
};
const corDor = d => d <= 3 ? "#3F6B52" : d <= 6 ? C.accentWarm : C.danger;
const mesAno = d => { const x = new Date(d + "T12:00:00"); return `${String(x.getMonth() + 1).padStart(2, "0")}/${x.getFullYear()}`; };
const hoje = () => new Date().toISOString().split("T")[0];

function alertasVencidos(atendimentos, diasLimite = 7) {
  const por = {};
  atendimentos.forEach(a => { if (!por[a.prontuario] || a.dataAtendimento > por[a.prontuario].dataAtendimento) por[a.prontuario] = a; });
  const hj = new Date();
  return Object.values(por).filter(a => {
    if (a.dataTermino) return false;
    return Math.round((hj - new Date(a.dataAtendimento + "T12:00:00")) / 86400000) >= diasLimite;
  });
}

function gerarRelatorio(atendimentos, mes) {
  const f = mes ? atendimentos.filter(a => mesAno(a.dataAtendimento) === mes) : atendimentos;
  const origens = {}, tipos = {}, coberturas = {}, comps = {}, wagner = {}, npuap = {};
  f.forEach(a => {
    if (a.origem) origens[a.origem] = (origens[a.origem] || 0) + 1;
    if (a.tipoFerida) tipos[a.tipoFerida] = (tipos[a.tipoFerida] || 0) + 1;
    (a.coberturas || []).forEach(c => { coberturas[c] = (coberturas[c] || 0) + 1; });
    (a.complicacoes || []).forEach(c => { comps[c] = (comps[c] || 0) + 1; });
    if (a.wagnerGrau != null && a.wagnerGrau !== "") { const k = `Grau ${a.wagnerGrau}`; wagner[k] = (wagner[k] || 0) + 1; }
    if (a.npuapEstagio) npuap[a.npuapEstagio] = (npuap[a.npuapEstagio] || 0) + 1;
  });
  const total = f.length, unicos = new Set(f.map(a => a.prontuario)).size;
  const infeccoes = f.filter(a => (a.complicacoes || []).includes("Infecção")).length;
  return { total, unicos, origens, tipos, coberturas, comps, wagner, npuap, infeccoes, taxa: total ? (infeccoes / total * 100).toFixed(1) : 0, lista: f };
}

function MultiCheck({ options, selected, onChange, allowCustom, customOptions, onAddCustom }) {
  const toggle = v => onChange(selected.includes(v) ? selected.filter(x => x !== v) : [...selected, v]);
  const [showCustomInput, setShowCustomInput] = useState(false);
  const [customText, setCustomText] = useState("");

  function handleAddCustom() {
    const texto = customText.trim();
    if (!texto) return;
    if (onAddCustom) onAddCustom(texto);
    onChange([...selected.filter(x => x !== texto), texto]);
    setCustomText("");
    setShowCustomInput(false);
  }

  const allOptions = customOptions ? [...options.filter(o => o !== "Outra"), ...customOptions, "Outra"] : options;

  return (
    <div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
        {allOptions.map(o => (
          <button key={o} onClick={() => o === "Outra" ? setShowCustomInput(s => !s) : toggle(o)}
            style={{ padding: "6px 12px", borderRadius: 20,
              border: `1.5px solid ${o === "Outra" ? C.accentWarm : selected.includes(o) ? C.primary : C.border}`,
              background: o === "Outra" ? (showCustomInput ? C.accentWarm : "transparent") : selected.includes(o) ? C.primary : "#FAFBFC",
              color: o === "Outra" ? (showCustomInput ? "#fff" : C.accentWarm) : selected.includes(o) ? "#fff" : C.text,
              fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
            {o === "Outra" ? "➕ Adicionar cobertura" : o}
          </button>
        ))}
      </div>
      {showCustomInput && allowCustom && (
        <div style={{ marginTop: 10, background: C.accentWarm + "15", border: `1.5px solid ${C.accentWarm}`, borderRadius: 10, padding: "12px" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.accentWarm, marginBottom: 8 }}>Nova cobertura personalizada:</div>
          <div style={{ display: "flex", gap: 8 }}>
            <input value={customText} onChange={e => setCustomText(e.target.value)}
              onKeyDown={e => e.key === "Enter" && handleAddCustom()}
              placeholder="Digite o nome da cobertura..."

function comprimirImagem(file, maxDim = 1280, qualidade = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Falha ao ler arquivo"));
    reader.onload = ev => {
      const img = new Image();
      img.onerror = () => reject(new Error("Falha ao carregar imagem"));
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w >= h) { h = Math.round(h * (maxDim / w)); w = maxDim; }
          else { w = Math.round(w * (maxDim / h)); h = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        try {
          const dataUrl = canvas.toDataURL("image/jpeg", qualidade);
          resolve(dataUrl);
        } catch (err) {
          reject(err);
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function CapturaFoto({ fotos, onChange }) {
  const inputRef = useRef();
  const [comprimindo, setComprimindo] = useState(false);
  async function handleFile(e) {
    const arquivos = Array.from(e.target.files);
    if (!arquivos.length) return;
    setComprimindo(true);
    for (const file of arquivos) {
      try {
        const src = await comprimirImagem(file, 1280, 0.7);
        onChange(prev => [...prev, { src, data: hoje(), legenda: "", id: Date.now().toString() + Math.random() }]);
      } catch (err) {
        // Se a compressão falhar por qualquer motivo, cai para leitura simples como salvaguarda
        try {
          const r = await new Promise((res, rej) => {
            const rd = new FileReader();
            rd.onload = ev => res(ev.target.result);
            rd.onerror = rej;
            rd.readAsDataURL(file);
          });
          onChange(prev => [...prev, { src: r, data: hoje(), legenda: "", id: Date.now().toString() + Math.random() }]);
        } catch (e2) { /* ignora arquivo problemático */ }
      }
    }
    setComprimindo(false);
    e.target.value = "";
  }
  return (
    <div>
      <button onClick={() => inputRef.current.click()} disabled={comprimindo}
        style={{ width: "100%", padding: "14px", border: `2px dashed ${C.primaryLight}`, borderRadius: 10, background: C.primaryLight + "11", color: C.primaryLight, fontWeight: 700, cursor: comprimindo ? "default" : "pointer", fontSize: 15, marginBottom: 12, opacity: comprimindo ? 0.6 : 1 }}>
        {comprimindo ? "⏳ Processando foto(s)..." : "📷 Adicionar Foto da Ferida"}
      </button>
      <input ref={inputRef} type="file" accept="image/*" multiple capture="environment" onChange={handleFile} style={{ display: "none" }} />
      {fotos.length > 0 && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {fotos.map(f => (
            <div key={f.id} style={{ borderRadius: 10, overflow: "hidden", border: `1px solid ${C.border}`, position: "relative" }}>
              <img src={f.src} alt="ferida" style={{ width: "100%", height: 130, objectFit: "cover", display: "block" }} />
              <div style={{ padding: "6px 8px", background: C.surface }}>
                <div style={{ fontSize: 10, color: C.muted }}>{fmtDate(f.data)}</div>
                <input value={f.legenda} onChange={e => onChange(prev => prev.map(x => x.id === f.id ? { ...x, legenda: e.target.value } : x))}
                  placeholder="Legenda..." style={{ width: "100%", border: `1px solid ${C.border}`, borderRadius: 6, padding: "4px 6px", fontSize: 12, boxSizing: "border-box" }} />
              </div>
              <button onClick={() => onChange(prev => prev.filter(x => x.id !== f.id))}
                style={{ position: "absolute", top: 5, right: 5, background: C.danger, border: "none", borderRadius: "50%", width: 24, height: 24, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 14, lineHeight: "24px", textAlign: "center" }}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ComparativoFotos({ atendimentos }) {
  const todas = atendimentos.flatMap(a => (a.fotos || []).map(f => ({ ...f, dataAtend: a.dataAtendimento }))).sort((a, b) => a.data.localeCompare(b.data));
  if (!todas.length) return <div style={{ color: C.muted, fontSize: 13, padding: 12 }}>Nenhuma foto registrada ainda.</div>;
  return (
    <div>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 8 }}>📈 {todas.length} foto(s) — evolução temporal da ferida</div>
      <div style={{ display: "flex", overflowX: "auto", gap: 10, paddingBottom: 8 }}>
        {todas.map((f, i) => (
          <div key={f.id} style={{ minWidth: 140, border: `2px solid ${i === 0 ? C.muted : i === todas.length - 1 ? C.accent : C.border}`, borderRadius: 10, overflow: "hidden", flexShrink: 0 }}>

    </div>

}

            ℹ️ As fotos são comprimidas automaticamente (máx. 1280px, JPEG 70%) antes de salvar, para reduzir o uso de dados e espaço no banco.
          </div>
          <CapturaFoto fotos={form.fotos} onChange={fn => setForm(f => ({ ...f, fotos: typeof fn === "function" ? fn(f.fotos) : fn }))} />
        </Card>
      )}

      {/* STEP 5 — Conduta */}
      {step === 5 && (
        <Card>
          <SecTitle icon="💊" title="Conduta e Tratamento" />
          <Field label="Coberturas Utilizadas"><MultiCheck options={COBERTURAS} selected={form.coberturas} onChange={v => set("coberturas", v)} allowCustom={true} customOptions={form.customCoberturas} onAddCustom={v => set("customCoberturas", [...(form.customCoberturas||[]).filter(x=>x!==v), v])} /></Field>
          <Field label="Técnica de Curativo"><Textarea value={form.tecnica} onChange={v => set("tecnica", v)} placeholder="Descreva: irrigação, desbridamento, aplicação da cobertura, técnica asséptica..." /></Field>
          <Field label="Frequência de Troca"><Input value={form.frequencia} onChange={v => set("frequencia", v)} placeholder="Ex: A cada 48h, diário, 2× semana, conforme saturação..." /></Field>
          <Field label="Observações / Evolução Clínica"><Textarea value={form.observacoes} onChange={v => set("observacoes", v)} rows={4} placeholder="Resposta ao tratamento, orientações ao paciente e família, encaminhamentos, intercorrências..." /></Field>
          {erro && <div style={{ background: "#FDEDEC", border: `1px solid ${C.danger}`, borderRadius: 8, padding: "10px 14px", color: C.danger, fontSize: 13, marginBottom: 12 }}>{erro}</div>}
          <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
            <button onClick={onCancelar} style={{ flex: 1, padding: "13px", borderRadius: 10, border: `1.5px solid ${C.border}`, background: "transparent", color: C.muted, fontWeight: 700, cursor: "pointer", fontSize: 14 }}>Cancelar</button>
            <button onClick={handleSalvar} disabled={salvando}
              style={{ flex: 2, padding: "13px", borderRadius: 10, border: "none", background: salvando ? C.muted : C.primary, color: "#fff", fontWeight: 700, cursor: salvando ? "default" : "pointer", fontSize: 15, boxShadow: `0 3px 10px ${C.primary}55` }}>
              {salvando ? "Salvando..." : "✅ Salvar Atendimento"}
            </button>
          </div>
        </Card>
      )}

      {/* Navegação */}
      <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 4px 0" }}>
        <button onClick={() => setStep(s => Math.max(0, s - 1))} disabled={step === 0}
          style={{ padding: "10px 20px", borderRadius: 8, border: `1.5px solid ${C.border}`, background: "transparent", color: step === 0 ? C.border : C.primary, fontWeight: 700, cursor: step === 0 ? "default" : "pointer", fontSize: 14 }}>← Anterior</button>
        {step < 5 && (
          <button onClick={() => setStep(s => s + 1)}
            style={{ padding: "10px 20px", borderRadius: 8, border: "none", background: C.primary, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 14 }}>Próximo →</button>
        )}
      </div>
    </div>
  );
}

// PRONTUÁRIO INDIVIDUAL
// ═══════════════════════════════════════════════════════════════════════════════
function ProntuarioPaciente({ prontuario, atendimentos, onVoltar, onDeletar, onVerGaleria, onNovoAtendimento, onDeletarPaciente }) {
  const lista = atendimentos.filter(a => a.prontuario === prontuario);
  const ultimo = lista[0];
  if (!ultimo) return null;

  const bradenScore = ultimo.braden ? BRADEN.reduce((s, b) => s + (ultimo.braden[b.id] || 0), 0) : 0;
  const bradenOk = ultimo.braden && BRADEN.every(b => ultimo.braden[b.id]);
  const risco = bradenOk && bradenScore >= 6 ? bradenRisco(bradenScore) : null;
  const wagnerSel = ultimo.wagnerGrau != null ? WAGNER.find(w => w.grau === ultimo.wagnerGrau) : null;
  const npuapSel = ultimo.npuapEstagio ? NPUAP.find(n => n.estagio === ultimo.npuapEstagio) : null;
  const [confirmDel, setConfirmDel] = useState(null);
  const [confirmDelPaciente, setConfirmDelPaciente] = useState(false);
  const [excluindoPaciente, setExcluindoPaciente] = useState(false);

  async function handleExcluirPaciente() {
    setExcluindoPaciente(true);
    try {
      await dbDeletarPaciente(prontuario);
      onDeletarPaciente();
    } catch (e) {
      setExcluindoPaciente(false);
      alert("Erro ao excluir o cadastro. Tente novamente.");
    }
  }

  return (
    <div style={{ maxWidth: 600, margin: "0 auto" }}>
      <button onClick={onVoltar} style={{ background: "none", border: "none", color: C.primary, fontWeight: 700, cursor: "pointer", marginBottom: 12, fontSize: 14 }}>← Voltar à lista</button>

      {/* Ação principal: continuar tratamento deste paciente */}
      {onNovoAtendimento && (
        <button onClick={() => onNovoAtendimento(prontuario)}
          style={{ width: "100%", padding: "14px", borderRadius: 12, border: "none", background: C.primary, color: "#fff",
            fontWeight: 700, fontSize: 15, cursor: "pointer", marginBottom: 10, display: "flex", alignItems: "center",
            justifyContent: "center", gap: 8, boxShadow: `0 3px 10px ${C.primary}44` }}>
          🔄 Registrar Novo Atendimento deste Paciente
        </button>
      )}

      {/* Ação secundária: excluir cadastro completo do paciente */}
      <button onClick={() => setConfirmDelPaciente(true)}
        style={{ width: "100%", padding: "10px", borderRadius: 10, border: `1.5px solid ${C.danger}66`, background: "transparent",
          color: C.danger, fontWeight: 600, fontSize: 13, cursor: "pointer", marginBottom: 14 }}>
        🗑️ Excluir Cadastro deste Paciente
      </button>

      {confirmDelPaciente && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 9999,
          display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ background: C.surface, borderRadius: 16, padding: "24px 20px", width: "100%", maxWidth: 420 }}>
            <div style={{ fontSize: 32, textAlign: "center", marginBottom: 10 }}>⚠️</div>
            <div style={{ fontWeight: 700, fontSize: 16, color: C.danger, textAlign: "center", marginBottom: 8 }}>
              Excluir cadastro de {ultimo.nome}?
            </div>
            <div style={{ fontSize: 13, color: C.muted, textAlign: "center", marginBottom: 18, lineHeight: 1.5 }}>
              Isso vai apagar <strong>todos os {lista.length} atendimento(s)</strong>, fotos e histórico deste paciente
              permanentemente. Essa ação não pode ser desfeita.
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setConfirmDelPaciente(false)} disabled={excluindoPaciente}
                style={{ flex: 1, padding: "12px", borderRadius: 10, border: `1.5px solid ${C.border}`, background: "transparent",
                  color: C.muted, fontWeight: 700, cursor: "pointer" }}>
                Cancelar
              </button>
              <button onClick={handleExcluirPaciente} disabled={excluindoPaciente}
                style={{ flex: 1, padding: "12px", borderRadius: 10, border: "none", background: C.danger, color: "#fff",
                  fontWeight: 700, cursor: excluindoPaciente ? "default" : "pointer", opacity: excluindoPaciente ? 0.7 : 1 }}>
                {excluindoPaciente ? "Excluindo..." : "Excluir Definitivamente"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Cabeçalho do paciente */}
      <Card style={{ borderTop: `4px solid ${C.primary}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8 }}>
          <div>
            <div style={{ fontWeight: 800, fontSize: 18 }}>{ultimo.nome}</div>
            <div style={{ color: C.muted, fontSize: 13 }}>Prontuário: <strong>{prontuario}</strong>{ultimo.leito ? ` · ${ultimo.leito}` : ""}</div>
            {ultimo.dataNascimento && <div style={{ color: C.muted, fontSize: 13 }}>Nasc.: {fmtDate(ultimo.dataNascimento)}</div>}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 5, alignItems: "flex-end" }}>
            <Badge label={ultimo.origem} color={C.primaryLight} />
            {risco && <Badge label={`Braden ${bradenScore}pts — ${risco.label}`} color={risco.color} />}
            {wagnerSel && <Badge label={wagnerSel.label} color={wagnerSel.color} />}
            {npuapSel && <Badge label={npuapSel.estagio} color={npuapSel.cor} />}
            {atendimentos.filter(a=>a.prontuario===prontuario).some(a=>(a.fotos||[]).length>0) && onVerGaleria && (
              <button onClick={onVerGaleria}
                style={{ padding:"6px 12px", background:C.accentWarm, border:"none", borderRadius:8,
                  color:"#fff", fontWeight:700, fontSize:12, cursor:"pointer" }}>
                📁 Ver Galeria
              </button>
            )}
          </div>
        </div>
      </Card>

      {/* Comparativo de fotos */}
      {lista.some(a => (a.fotos || []).length > 0) && (
        <Card>
          <SecTitle icon="📷" title="Evolução Fotográfica" />
          <ComparativoFotos atendimentos={[...lista].reverse()} />
        </Card>
      )}

      <div style={{ fontWeight: 700, color: C.primary, marginBottom: 8, fontSize: 14 }}>{lista.length} atendimento(s) registrado(s)</div>

      {lista.map((a, i) => {
        const ws = a.wagnerGrau != null ? WAGNER.find(w => w.grau === a.wagnerGrau) : null;
        const ns = a.npuapEstagio ? NPUAP.find(n => n.estagio === a.npuapEstagio) : null;
        const bs = a.braden ? BRADEN.reduce((s, b) => s + (a.braden[b.id] || 0), 0) : 0;
        const bOk = a.braden && BRADEN.every(b => a.braden[b.id]);
        return (
          <Card key={a.id} style={{ borderLeft: `4px solid ${i === 0 ? C.accent : C.border}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
              <span style={{ fontWeight: 700, color: C.primary, fontSize: 15 }}>📅 {fmtDate(a.dataAtendimento)}</span>
              <div style={{ display: "flex", gap: 5, flexWrap: "wrap", alignItems: "center" }}>
                <Badge label={a.tipoFerida} color={C.primary} small />
                {i === 0 && <Badge label="Último" color={C.accent} small />}
                {confirmDel === a.id ? (
                  <div style={{ display: "flex", gap: 4 }}>
                    <button onClick={async () => { await dbDeletar(a.id); onDeletar(a.id); setConfirmDel(null); }}
                      style={{ fontSize: 11, padding: "3px 8px", background: C.danger, color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700 }}>Confirmar</button>
                    <button onClick={() => setConfirmDel(null)}
                      style={{ fontSize: 11, padding: "3px 8px", background: C.muted, color: "#fff", border: "none", borderRadius: 6, cursor: "pointer" }}>Cancelar</button>
                  </div>
                ) : (
                  <button onClick={() => setConfirmDel(a.id)}
                    style={{ fontSize: 11, padding: "3px 8px", background: "transparent", color: C.muted, border: `1px solid ${C.border}`, borderRadius: 6, cursor: "pointer" }}>🗑</button>
                )}
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, fontSize: 13, marginBottom: 8 }}>
              <div><span style={{ color: C.muted }}>Local:</span> {a.localizacao || "—"}</div>
              <div><span style={{ color: C.muted }}>Dias em trat.:</span> <strong>{diasTrat(a.dataInicio, a.dataTermino) ?? "—"}</strong></div>
              <div><span style={{ color: C.muted }}>Área:</span> {calcArea(a.comprimento, a.largura) || "—"} cm²</div>
              <div><span style={{ color: C.muted }}>Dor EVA:</span> <strong style={{ color: corDor(a.dor) }}>{a.dor}/10</strong></div>
              <div><span style={{ color: C.muted }}>Exsudato:</span> {a.exsudato || "—"}</div>
              <div><span style={{ color: C.muted }}>Fase:</span> {a.fasecicatrizacao || "—"}</div>
              <div><span style={{ color: C.muted }}>Odor:</span> {a.odor || "—"}</div>
              <div><span style={{ color: C.muted }}>Bordas:</span> {a.bordas || "—"}</div>
            </div>
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 8 }}>
              {bOk && <Badge label={`Braden: ${bs}pts`} color={bradenRisco(bs)?.color || C.muted} small />}
              {ws && <Badge label={ws.label} color={ws.color} small />}
              {ns && <Badge label={ns.estagio} color={ns.cor} small />}
            </div>
            {(a.coberturas || []).length > 0 && (
              <div style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, textTransform: "uppercase", marginBottom: 4 }}>Coberturas</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>{a.coberturas.map(c => <Badge key={c} label={c} color={C.primaryLight} small />)}</div>
              </div>
            )}
            {(a.complicacoes || []).length > 0 && (
              <div style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, textTransform: "uppercase", marginBottom: 4 }}>Complicações</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>{a.complicacoes.map(c => <Badge key={c} label={c} color={c === "Infecção" ? C.danger : C.accentWarm} small />)}</div>
              </div>
            )}
            {a.tecnica && <div style={{ fontSize: 13, background: "#EAF4FB", borderRadius: 8, padding: "8px 10px", marginTop: 4 }}><strong>Técnica:</strong> {a.tecnica}</div>}
            {a.aspecto && <div style={{ fontSize: 13, background: C.bg, borderRadius: 8, padding: "8px 10px", marginTop: 6 }}><strong>Leito:</strong> {a.aspecto}</div>}
            {a.observacoes && <div style={{ fontSize: 13, background: "#F4F6F7", borderRadius: 8, padding: "8px 10px", marginTop: 6 }}><strong>Obs:</strong> {a.observacoes}</div>}
            {a.frequencia && <div style={{ fontSize: 12, color: C.muted, marginTop: 6 }}>🔄 Frequência: {a.frequencia}</div>}
          </Card>
        );
      })}
    </div>
  );
}

// ALERTAS
// ═══════════════════════════════════════════════════════════════════════════════
function PainelAlertas({ atendimentos, onVerPaciente }) {
  const [dias, setDias] = useState(7);
  const vencidos = alertasVencidos(atendimentos, dias);
  return (
    <div style={{ maxWidth: 600, margin: "0 auto" }}>
      <Card style={{ borderTop: `4px solid ${C.danger}` }}>
        <SecTitle icon="🚨" title="Alertas de Retorno" />
        <Field label="Pacientes sem atendimento há quantos dias:">
          <div style={{ display: "flex", gap: 8 }}>
            {[3, 5, 7, 10, 14].map(d => (
              <button key={d} onClick={() => setDias(d)}
                style={{ flex: 1, padding: "9px 4px", borderRadius: 8, border: `1.5px solid ${dias === d ? C.danger : C.border}`, background: dias === d ? C.danger : "transparent", color: dias === d ? "#fff" : C.text, fontWeight: 700, cursor: "pointer", fontSize: 13 }}>
                {d}d
              </button>
            ))}
          </div>
        </Field>
      </Card>
      {vencidos.length === 0 ? (
        <div style={{ textAlign: "center", padding: 36 }}>
          <div style={{ fontSize: 44, marginBottom: 8 }}>✅</div>
          <div style={{ fontWeight: 700, fontSize: 16, color: C.accent }}>Nenhum paciente com retorno vencido!</div>
          <div style={{ color: C.muted, fontSize: 13, marginTop: 6 }}>Todos atendidos nos últimos {dias} dias</div>
        </div>
      ) : (
        <>
          <div style={{ marginBottom: 12 }}><Badge label={`⚠️ ${vencidos.length} paciente(s) com retorno pendente`} color={C.danger} /></div>
          {vencidos.map(a => {
            const d = Math.round((new Date() - new Date(a.dataAtendimento + "T12:00:00")) / 86400000);
            return (
              <button key={a.prontuario} onClick={() => onVerPaciente(a.prontuario)}
                style={{ width: "100%", textAlign: "left", background: C.surface, border: `2px solid ${C.danger}44`, borderRadius: 12, padding: "14px", marginBottom: 10, cursor: "pointer", boxShadow: C.cardShadow }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{a.nome}</div>
                    <div style={{ color: C.muted, fontSize: 12 }}>Pront. {a.prontuario}{a.leito ? ` · ${a.leito}` : ""}</div>
                    <div style={{ fontSize: 12, color: C.muted, marginTop: 4 }}>Último atendimento: {fmtDate(a.dataAtendimento)}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ background: d >= 14 ? C.danger : C.accentWarm, color: "#fff", borderRadius: 8, padding: "5px 10px", fontWeight: 800, fontSize: 20 }}>{d}d</div>
                    <div style={{ fontSize: 10, color: C.danger, marginTop: 2 }}>sem retorno</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                  <Badge label={a.origem} color={C.primaryLight} small />
                  <Badge label={a.tipoFerida} color={C.primary} small />
                </div>
              </button>
            );
          })}
        </>
      )}
    </div>
  );
}

// RELATÓRIO
// ═══════════════════════════════════════════════════════════════════════════════
function Relatorio({ atendimentos }) {
  const meses = [...new Set(atendimentos.map(a => mesAno(a.dataAtendimento)))].sort().reverse();
  const [mesSel, setMesSel] = useState(meses[0] || "");
  const rel = gerarRelatorio(atendimentos, mesSel);

  function exportarPDF() {
    // Gera seção de fotos por paciente
    function fotosPacientePDF(prontuario) {
      const atendsP = rel.lista.filter(a => a.prontuario === prontuario);
      const todasFotos = atendsP.flatMap(a => (a.fotos || []).map(f => ({...f, dataAtend: a.dataAtendimento})))
        .sort((a,b) => a.data.localeCompare(b.data));
      if (!todasFotos.length) return "";
      const imgs = todasFotos.map((f,i) => {
        const tag = i===0?"📌 Inicial":i===todasFotos.length-1?"✅ Atual":`Foto ${i+1}`;
        const tagCor = i===0?"#7F8C8D":i===todasFotos.length-1?"#0F5C56":"#5D6D7E";
        return `<div class="foto-card">
          <img src="${f.src}"/>
          <div class="tag" style="color:${tagCor}">${tag}</div>
          <div class="dt">${fmtDate(f.data)}</div>
          ${f.legenda?`<div class="dt">${f.legenda}</div>`:""}
        </div>`;
      }).join("");
      return `<div class="fotos-titulo">📷 Evolução Fotográfica (${todasFotos.length} foto${todasFotos.length>1?"s":""})</div><div>${imgs}</div>`;
    }

    const linhas = rel.lista.map(a => {
      const ws = a.wagnerGrau != null ? `Wagner G${a.wagnerGrau}` : "—";
      const ns = a.npuapEstagio || "—";
      const bs = a.braden && BRADEN.every(b => a.braden[b.id]) ? `${BRADEN.reduce((s, b) => s + (a.braden[b.id] || 0), 0)}pts` : "—";
      const fotos = fotosPacientePDF(a.prontuario);
      return `<tr><td>${fmtDate(a.dataAtendimento)}</td><td>${a.nome}</td><td>${a.prontuario}</td><td>${a.origem || "—"}</td><td>${a.tipoFerida || "—"}</td><td>${a.localizacao || "—"}</td><td>${diasTrat(a.dataInicio, a.dataTermino) ?? "—"}d</td><td>${calcArea(a.comprimento, a.largura) || "—"}cm²</td><td>${(a.coberturas || []).join(", ") || "—"}</td><td>${(a.complicacoes || []).join(", ") || "—"}</td><td>${a.dor}/10</td><td>${bs}</td><td>${ws}</td><td>${ns}</td></tr>${fotos ? `<tr class="fotos-row"><td colspan="14">${fotos}</td></tr>` : ""}`;
    }).join("");

    const barItem = (k, v, max, cor) => {
      const pct = max ? Math.round(v / max * 100) : 0;
      return `<div class="barrow">
        <div class="barlabel"><span>${k}</span><span class="barval">${v} (${pct}%)</span></div>
        <div class="bartrack"><div class="barfill" style="width:${pct}%;background:${cor}"></div></div>
      </div>`;
    };
    const barList = (obj, max, cor) => {
      const entries = Object.entries(obj).sort((a, b) => b[1] - a[1]);
      if (!entries.length) return `<div class="semdados">Sem dados neste período.</div>`;
      return entries.map(([k, v]) => barItem(k, v, max, cor)).join("");
    };

    const html = `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Relatório EstomaCare</title>
<style>
  @page { margin: 18mm 14mm; }
  * { box-sizing: border-box; }
  body{font-family:'Segoe UI',Arial,Helvetica,sans-serif;margin:0;color:#1C2833;font-size:13px;line-height:1.5;}
  .header{background:linear-gradient(135deg,#1E293B 0%,#0F172A 100%);color:#fff;padding:22px 28px;border-radius:10px;margin-bottom:20px;}
  .header .brand{display:flex;align-items:center;gap:12px;}
  .header .brand .ic{font-size:32px;}
  .header h1{margin:0;font-size:22px;font-weight:800;letter-spacing:.3px;}
  .header .sub{color:#AED6F1;font-size:12px;margin-top:2px;}
  .header .meta{margin-top:14px;display:flex;gap:26px;flex-wrap:wrap;font-size:11.5px;color:#D6EAF8;border-top:1px solid rgba(255,255,255,.25);padding-top:10px;}
  .header .meta strong{color:#fff;}

  h2.sectitle{color:#1E293B;font-size:15px;font-weight:800;margin:26px 0 12px;padding-bottom:6px;border-bottom:3px solid #1E293B;display:flex;align-items:center;gap:8px;}
  h2.sectitle .n{background:#1E293B;color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:6px 0 8px;}
  .kpi{background:#F4F8FB;border:1px solid #D5E3ED;border-radius:10px;padding:14px 10px;text-align:center;}
  .kpi .val{font-size:26px;font-weight:800;color:#1E293B;line-height:1.1;}
  .kpi .lbl{font-size:10px;color:#5D6D7E;text-transform:uppercase;letter-spacing:.4px;margin-top:4px;font-weight:600;}

// LISTA DE ATENDIMENTOS
// ═══════════════════════════════════════════════════════════════════════════════
function ListaAtendimentos({ atendimentos, onVerPaciente, onVerGaleria }) {
  const [busca, setBusca] = useState("");
  const filtrados = atendimentos.filter(a =>
    a.nome.toLowerCase().includes(busca.toLowerCase()) ||
    a.prontuario.includes(busca) ||
    (a.tipoFerida || "").toLowerCase().includes(busca.toLowerCase()) ||
    (a.origem || "").toLowerCase().includes(busca.toLowerCase())
  );

  // Agrupa por prontuário para mostrar apenas o último de cada paciente
  const porPaciente = {};
  filtrados.forEach(a => { if (!porPaciente[a.prontuario]) porPaciente[a.prontuario] = a; });
  const lista = Object.values(porPaciente);

  return (
    <div style={{ maxWidth: 600, margin: "0 auto" }}>
      <input value={busca} onChange={e => setBusca(e.target.value)} placeholder="🔍 Nome, prontuário, tipo de ferida ou setor..."
        style={{ width: "100%", border: `1.5px solid ${C.border}`, borderRadius: 10, padding: "12px 14px", fontSize: 15, background: C.surface, outline: "none", boxSizing: "border-box", marginBottom: 14 }} />

      {lista.length === 0 && (
        <div style={{ textAlign: "center", color: C.muted, padding: 48, fontSize: 15, lineHeight: 2 }}>
          {atendimentos.length === 0 ? (
            <>
              <div style={{ fontSize: 48, marginBottom: 12 }}>🩺</div>
              <div>Nenhum atendimento registrado.</div>
              <div>Toque em <strong>+ Novo</strong> para começar.</div>
            </>
          ) : "Nenhum resultado encontrado."}
        </div>
      )}

      {lista.map(a => {
        const ws = a.wagnerGrau != null ? WAGNER.find(w => w.grau === a.wagnerGrau) : null;
        const ns = a.npuapEstagio ? NPUAP.find(n => n.estagio === a.npuapEstagio) : null;
        const totalAtend = atendimentos.filter(x => x.prontuario === a.prontuario).length;
        return (
          <button key={a.prontuario} onClick={() => onVerPaciente(a.prontuario)}
            style={{ width: "100%", textAlign: "left", background: C.surface, border: `1.5px solid ${C.border}`, borderRadius: 12, padding: "14px", marginBottom: 10, cursor: "pointer", boxShadow: C.cardShadow }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 4 }}>
              <div>
                <div style={{ fontWeight: 700, color: C.text, fontSize: 15 }}>{a.nome}</div>
                <div style={{ color: C.muted, fontSize: 12, marginTop: 2 }}>Pront. {a.prontuario}{a.leito ? ` · ${a.leito}` : ""}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 12, color: C.muted }}>Último: {fmtDate(a.dataAtendimento)}</div>
                <div style={{ fontSize: 11, color: C.primaryLight, fontWeight: 600, marginTop: 2 }}>{totalAtend} atendimento(s)</div>
                {diasTrat(a.dataInicio, a.dataTermino) !== null && <div style={{ color: C.accent, fontSize: 12, fontWeight: 700 }}>{diasTrat(a.dataInicio, a.dataTermino)}d em trat.</div>}
              </div>
            </div>
            <div style={{ display: "flex", gap: 5, marginTop: 8, flexWrap: "wrap" }}>
              <Badge label={a.origem} color={C.primaryLight} small />
              <Badge label={a.tipoFerida || "—"} color={C.primary} small />
              {ws && <Badge label={ws.label} color={ws.color} small />}

// GALERIA DE FOTOS POR PACIENTE
// ═══════════════════════════════════════════════════════════════════════════════
function GaleriaPaciente({ prontuario, atendimentos, onVoltar }) {
  const lista = atendimentos.filter(a => a.prontuario === prontuario);
  const ultimo = lista[0];
  const todas = lista.flatMap(a => (a.fotos || []).map(f => ({
    ...f, dataAtend: a.dataAtendimento, tipoFerida: a.tipoFerida, localizacao: a.localizacao
  }))).sort((a, b) => a.data.localeCompare(b.data));

  const [fotoSel, setFotoSel] = useState(null);

  if (!ultimo) return null;

  return (
    <div style={{ maxWidth: 600, margin: "0 auto" }}>
      <button onClick={onVoltar} style={{ background: "none", border: "none", color: C.primary, fontWeight: 700, cursor: "pointer", marginBottom: 12, fontSize: 14 }}>← Voltar</button>
      <Card style={{ borderTop: `4px solid ${C.accent}` }}>
        <SecTitle icon="📁" title={`Galeria — ${ultimo.nome}`} />
        <div style={{ color: C.muted, fontSize: 13 }}>Prontuário: {prontuario} · {todas.length} foto(s)</div>
      </Card>

      {todas.length === 0 ? (
        <div style={{ textAlign: "center", padding: 40, color: C.muted }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>📷</div>
          <div>Nenhuma foto registrada para este paciente.</div>
        </div>
      ) : (
        <>
          {/* Grade de fotos */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 14 }}>
            {todas.map((f, i) => (
              <div key={f.id} onClick={() => setFotoSel(f)}
                style={{ position: "relative", borderRadius: 10, overflow: "hidden", cursor: "pointer",
                  border: `2px solid ${i === 0 ? C.muted : i === todas.length - 1 ? C.accent : C.border}` }}>
                <img src={f.src} alt="ferida" style={{ width: "100%", height: 110, objectFit: "cover", display: "block" }} />
                <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: "rgba(0,0,0,0.55)", padding: "4px 6px" }}>
                  <div style={{ color: "#fff", fontSize: 9, fontWeight: 700 }}>
                    {i === 0 ? "📌 Inicial" : i === todas.length - 1 ? "✅ Atual" : `Foto ${i + 1}`}
                  </div>
                  <div style={{ color: "#ccc", fontSize: 9 }}>{fmtDate(f.data)}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Visualização ampliada */}
          {fotoSel && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.92)", zIndex: 9999,
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 16 }}>
              <button onClick={() => setFotoSel(null)}
                style={{ position: "absolute", top: 20, right: 20, background: "rgba(255,255,255,0.2)", border: "none",
                  borderRadius: "50%", width: 36, height: 36, color: "#fff", fontSize: 18, cursor: "pointer" }}>×</button>
              <img src={fotoSel.src} alt="ferida ampliada"
                style={{ maxWidth: "100%", maxHeight: "70vh", borderRadius: 12, objectFit: "contain" }} />
              <div style={{ marginTop: 14, textAlign: "center" }}>
                <div style={{ color: "#fff", fontWeight: 700, fontSize: 15 }}>{fmtDate(fotoSel.data)}</div>
                {fotoSel.legenda && <div style={{ color: "#ccc", fontSize: 13, marginTop: 4 }}>{fotoSel.legenda}</div>}
                <div style={{ color: C.accent, fontSize: 12, marginTop: 4 }}>{fotoSel.tipoFerida} · {fotoSel.localizacao}</div>
              </div>
              {/* Navegação entre fotos */}
              <div style={{ display: "flex", gap: 16, marginTop: 16 }}>
                <button onClick={() => { const idx = todas.findIndex(f => f.id === fotoSel.id); if (idx > 0) setFotoSel(todas[idx - 1]); }}
                  disabled={todas.findIndex(f => f.id === fotoSel.id) === 0}
                  style={{ padding: "8px 20px", background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 8,
                    color: "#fff", cursor: "pointer", fontSize: 18, opacity: todas.findIndex(f => f.id === fotoSel.id) === 0 ? 0.3 : 1 }}>‹</button>
                <span style={{ color: C.muted, fontSize: 12, alignSelf: "center" }}>
                  {todas.findIndex(f => f.id === fotoSel.id) + 1} / {todas.length}
                </span>
                <button onClick={() => { const idx = todas.findIndex(f => f.id === fotoSel.id); if (idx < todas.length - 1) setFotoSel(todas[idx + 1]); }}
                  disabled={todas.findIndex(f => f.id === fotoSel.id) === todas.length - 1}
                  style={{ padding: "8px 20px", background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 8,
                    color: "#fff", cursor: "pointer", fontSize: 18, opacity: todas.findIndex(f => f.id === fotoSel.id) === todas.length - 1 ? 0.3 : 1 }}>›</button>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// CALENDÁRIO DE RETORNOS
// ═══════════════════════════════════════════════════════════════════════════════
function Calendario({ atendimentos, onVerPaciente }) {
  const agora = new Date();
  const [mes, setMes] = useState(agora.getMonth());
  const [ano, setAno] = useState(agora.getFullYear());
  const [diaSel, setDiaSel] = useState(null);
  const [modalFalta, setModalFalta] = useState(null);
  const [anotacaoFalta, setAnotacaoFalta] = useState("");
  const [faltas, setFaltas] = useState({});

  const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const DIAS_SEMANA = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

  // Busca retornos agendados (data_termino ou próximo retorno)
  function getRetornosDia(dia) {
    const dataStr = `${ano}-${String(mes+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;
    return atendimentos.filter(a => {
      if (a.dataTermino === dataStr) return true;
      // Verifica frequência para calcular próximo retorno
      if (a.dataAtendimento && a.frequencia) {
        const freq = a.frequencia.toLowerCase();
        const ultimo = new Date(a.dataAtendimento + "T12:00:00");
        const alvo = new Date(dataStr + "T12:00:00");
        const diff = Math.round((alvo - ultimo) / 86400000);
        if (freq.includes("diário") && diff % 1 === 0 && diff > 0) return true;
        if ((freq.includes("48h") || freq.includes("2 dia")) && diff % 2 === 0 && diff > 0) return true;
        if ((freq.includes("semana") || freq.includes("7")) && diff % 7 === 0 && diff > 0) return true;
        if (freq.includes("2x") && diff % 3 === 0 && diff > 0) return true;
      }
      return false;
    });
  }

  function diasNoMes(m, a) { return new Date(a, m + 1, 0).getDate(); }
  function primeiroDiaSemana(m, a) { return new Date(a, m, 1).getDay(); }

  const totalDias = diasNoMes(mes, ano);
  const primeiro = primeiroDiaSemana(mes, ano);
  const hoje = agora.getDate();
  const mesHoje = agora.getMonth();
  const anoHoje = agora.getFullYear();

  const retornosDiaSel = diaSel ? getRetornosDia(diaSel) : [];
  const faltasHoje = Object.entries(faltas).filter(([k]) => k.startsWith(`${ano}-${String(mes+1).padStart(2,"0")}`));

  // Alertas: pacientes com retorno vencido
  const vencidos = alertasVencidos(atendimentos, 7);

  return (
    <div style={{ maxWidth: 600, margin: "0 auto" }}>
      {/* Alertas de falta */}
      {vencidos.length > 0 && (
        <Card style={{ borderLeft: `4px solid ${C.danger}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <span style={{ fontSize: 18 }}>🚨</span>
            <span style={{ fontWeight: 700, color: C.danger, fontSize: 14 }}>{vencidos.length} paciente(s) com retorno vencido</span>
          </div>
          {vencidos.slice(0, 3).map(a => {
            const d = Math.round((new Date() - new Date(a.dataAtendimento + "T12:00:00")) / 86400000);
            return (
              <div key={a.prontuario} onClick={() => onVerPaciente(a.prontuario)}
                style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                  padding: "8px 0", borderBottom: `1px solid ${C.border}`, cursor: "pointer" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>{a.nome}</div>
                  <div style={{ fontSize: 11, color: C.muted }}>Último: {fmtDate(a.dataAtendimento)}</div>
                </div>
                <Badge label={`${d}d sem retorno`} color={C.danger} small />
              </div>
            );
          })}
        </Card>
      )}

      {/* Calendário */}
      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <button onClick={() => { if (mes === 0) { setMes(11); setAno(a => a - 1); } else setMes(m => m - 1); setDiaSel(null); }}
            style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: C.primary, padding: "4px 10px" }}>‹</button>
          <span style={{ fontWeight: 700, color: C.primary, fontSize: 16 }}>{MESES[mes]} {ano}</span>
          <button onClick={() => { if (mes === 11) { setMes(0); setAno(a => a + 1); } else setMes(m => m + 1); setDiaSel(null); }}
            style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: C.primary, padding: "4px 10px" }}>›</button>
        </div>

        {/* Cabeçalho dias da semana */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 6 }}>
          {DIAS_SEMANA.map(d => (
            <div key={d} style={{ textAlign: "center", fontSize: 10, fontWeight: 700, color: C.muted, padding: "4px 0" }}>{d}</div>
          ))}
        </div>

        {/* Dias do mês */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3 }}>
          {Array(primeiro).fill(null).map((_, i) => <div key={`e${i}`} />)}
          {Array(totalDias).fill(null).map((_, i) => {
            const dia = i + 1;
            const retornos = getRetornosDia(dia);
            const dataStr = `${ano}-${String(mes+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;
            const temFalta = faltas[dataStr];
            const ehHoje = dia === hoje && mes === mesHoje && ano === anoHoje;
            const ehSel = dia === diaSel;
            const ehPassado = new Date(dataStr) < new Date(hoje_str()) && !ehHoje;

            return (
              <button key={dia} onClick={() => setDiaSel(dia === diaSel ? null : dia)}
                style={{ position: "relative", aspectRatio: "1", borderRadius: 8, border: `1.5px solid ${ehSel ? C.primary : ehHoje ? C.accent : C.border}`,
                  background: ehSel ? C.primary : ehHoje ? C.accent + "22" : "transparent",
                  color: ehSel ? "#fff" : ehHoje ? C.accent : C.text,
                  fontWeight: ehHoje || ehSel ? 800 : 400, cursor: "pointer", fontSize: 13,
                  display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 1 }}>
                {dia}
                <div style={{ display: "flex", gap: 1, flexWrap: "wrap", justifyContent: "center" }}>
                  {retornos.length > 0 && <div style={{ width: 5, height: 5, borderRadius: "50%", background: ehSel ? "#fff" : C.accent }} />}
                  {temFalta && <div style={{ width: 5, height: 5, borderRadius: "50%", background: ehSel ? "#fff" : C.danger }} />}
                </div>
              </button>
            );
          })}
        </div>

        {/* Legenda */}
        <div style={{ display: "flex", gap: 12, marginTop: 10, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: C.muted }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.accent }} /> Retorno agendado
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: C.muted }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.danger }} /> Falta registrada
          </div>
        </div>
      </Card>

      {/* Detalhes do dia selecionado */}
      {diaSel && (
        <Card style={{ borderTop: `3px solid ${C.primary}` }}>
          <SecTitle icon="📅" title={`${String(diaSel).padStart(2,"0")}/${String(mes+1).padStart(2,"0")}/${ano}`} />
          {retornosDiaSel.length === 0 ? (
            <div style={{ color: C.muted, fontSize: 13 }}>Nenhum retorno agendado para este dia.</div>
          ) : (
            retornosDiaSel.map(a => {
              const dataStr = `${ano}-${String(mes+1).padStart(2,"0")}-${String(diaSel).padStart(2,"0")}`;
              const temFalta = faltas[dataStr + "_" + a.prontuario];
              return (
                <div key={a.id} style={{ padding: "10px 0", borderBottom: `1px solid ${C.border}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8 }}>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{a.nome}</div>
                      <div style={{ fontSize: 12, color: C.muted }}>Pront. {a.prontuario}</div>
                      <div style={{ fontSize: 12, color: C.muted }}>{a.tipoFerida} · {a.origem}</div>
                      {a.frequencia && <div style={{ fontSize: 11, color: C.primaryLight, marginTop: 2 }}>🔄 {a.frequencia}</div>}
                    </div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => onVerPaciente(a.prontuario)}
                        style={{ padding: "6px 12px", background: C.primary, border: "none", borderRadius: 8, color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                        Ver prontuário
                      </button>
                      <button onClick={() => { setModalFalta({ paciente: a, dataStr: dataStr + "_" + a.prontuario }); setAnotacaoFalta(faltas[dataStr + "_" + a.prontuario] || ""); }}
                        style={{ padding: "6px 12px", background: temFalta ? C.danger : C.border, border: "none", borderRadius: 8,
                          color: temFalta ? "#fff" : C.text, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                        {temFalta ? "⚠️ Falta" : "Registrar falta"}
                      </button>
                    </div>
                  </div>
                  {temFalta && (
                    <div style={{ marginTop: 8, background: C.danger + "15", borderRadius: 8, padding: "6px 10px", fontSize: 12, color: C.danger }}>
                      ⚠️ Falta registrada: {faltas[dataStr + "_" + a.prontuario]}
                    </div>
                  )}
                </div>
              );
            })
          )}
        </Card>
      )}

      {/* Modal registrar falta */}
      {modalFalta && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 9999,
          display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
          <div style={{ background: C.surface, borderRadius: "20px 20px 0 0", padding: "24px 20px", width: "100%", maxWidth: 560 }}>
            <div style={{ fontWeight: 700, fontSize: 16, color: C.danger, marginBottom: 6 }}>⚠️ Registrar Falta</div>
            <div style={{ fontSize: 13, color: C.muted, marginBottom: 14 }}>{modalFalta.paciente.nome}</div>
            <Field label="Anotação sobre a falta">
              <Textarea value={anotacaoFalta} onChange={setAnotacaoFalta} rows={3}
                placeholder="Ex: Paciente não compareceu, sem justificativa. Tentativa de contato por telefone..." />
            </Field>
            <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
              <button onClick={() => { setFaltas(f => { const nf = {...f}; delete nf[modalFalta.dataStr]; return nf; }); setModalFalta(null); }}
                style={{ flex: 1, padding: "12px", borderRadius: 10, border: `1.5px solid ${C.border}`, background: "transparent", color: C.muted, fontWeight: 700, cursor: "pointer" }}>
                Remover falta
              </button>
              <button onClick={() => { setFaltas(f => ({...f, [modalFalta.dataStr]: anotacaoFalta || "Falta não justificada"})); setModalFalta(null); }}
                style={{ flex: 2, padding: "12px", borderRadius: 10, border: "none", background: C.danger, color: "#fff", fontWeight: 700, cursor: "pointer" }}>
                Confirmar Falta
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function hoje_str() { return new Date().toISOString().split("T")[0]; }

// APP PRINCIPAL
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [tela, setTela] = useState("lista");
  const [atendimentos, setAtendimentos] = useState([]);
  const [prontuarioSel, setProntuarioSel] = useState(null);
  const [prefillNovo, setPrefillNovo] = useState(null);
  const [toast, setToast] = useState(null);
  const [carregando, setCarregando] = useState(true);

  // Carrega dados do IndexedDB ao iniciar
  useEffect(() => {
    dbGetAll().then(dados => {
      setAtendimentos(dados);
      setCarregando(false);
    }).catch(() => setCarregando(false));
  }, []);

  const showToast = (msg, color = C.accent) => { setToast({ msg, color }); setTimeout(() => setToast(null), 3000); };

  const handleSalvar = useCallback(async () => {
    const dados = await dbGetAll();
    setAtendimentos(dados);
    setTela("lista");
    showToast("✅ Atendimento salvo com sucesso!");
  }, []);

  const handleVerPaciente = (p) => { setProntuarioSel(p); setTela("prontuario"); };

  const handleNovoAtendimentoPaciente = (prontuario) => {
    const registrosPaciente = atendimentos.filter(a => a.prontuario === prontuario);
    const ultimo = registrosPaciente[0];
    if (ultimo) {
      setPrefillNovo({
        nome: ultimo.nome, prontuario: ultimo.prontuario, leito: ultimo.leito,
        origem: ultimo.origem, dataNascimento: ultimo.dataNascimento,
        tipoFerida: ultimo.tipoFerida, localizacao: ultimo.localizacao,
        dataInicio: ultimo.dataInicio,
      });
    }
    setTela("novo");
  };

  const handleDeletar = async (id) => {
    const dados = await dbGetAll();
    setAtendimentos(dados);
    const restantes = dados.filter(a => a.prontuario === prontuarioSel);
    if (restantes.length === 0) setTela("lista");
    showToast("🗑 Atendimento removido.", C.danger);
  };

  const handleDeletarPaciente = async () => {
    const dados = await dbGetAll();
    setAtendimentos(dados);
    setTela("lista");
    showToast("🗑 Cadastro do paciente excluído.", C.danger);
  };

  const vencidos = alertasVencidos(atendimentos, 7);

  const TABS = [
    { id: "lista", label: "Pacientes", icon: "📋" },
    { id: "calendario", label: "Agenda", icon: "📅" },
    { id: "alertas", label: "Alertas", icon: "🚨", badge: vencidos.length },
    { id: "relatorio", label: "Relatório", icon: "📊" },
  ];

  if (carregando) return (
    <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
      <div style={{ fontSize: 48 }}>🩺</div>
      <div style={{ fontWeight: 700, color: C.primary, fontSize: 18 }}>EstomaCare</div>
      <div style={{ color: C.muted, fontSize: 14 }}>Carregando dados...</div>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: C.bg, fontFamily: "'Segoe UI', system-ui, sans-serif", color: C.text }}>
      {/* HEADER */}
      <div style={{ background: C.headerBg, padding: "14px 16px 0", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 2px 14px rgba(0,0,0,.22)" }}>
        <div style={{ maxWidth: 600, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div>
              <div style={{ color: "#fff", fontWeight: 800, fontSize: 18, letterSpacing: .3 }}>🩺 EstomaCare</div>
              <div style={{ color: "#94A3B8", fontSize: 11 }}>Curativos & Estomaterapia · {atendimentos.length} registro(s)</div>
            </div>
            <button onClick={() => { setPrefillNovo(null); setTela("novo"); }}
              style={{ background: C.accent, border: "none", borderRadius: 24, padding: "9px 20px", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 15, boxShadow: `0 2px 10px ${C.accent}99`, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 20, lineHeight: 1 }}>+</span> Novo
            </button>
          </div>
          {tela !== "novo" && tela !== "prontuario" && (
            <div style={{ display: "flex" }}>
              {TABS.map(t => (
                <button key={t.id} onClick={() => setTela(t.id)}
                  style={{ flex: 1, padding: "9px 4px", border: "none", background: "transparent", color: tela === t.id ? "#fff" : "#94A3B8", fontWeight: 700, cursor: "pointer", fontSize: 12, borderBottom: tela === t.id ? `3px solid ${C.accent}` : "3px solid transparent", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, position: "relative" }}>
                  <span style={{ fontSize: 17 }}>{t.icon}</span><span>{t.label}</span>
                  {t.badge > 0 && <span style={{ position: "absolute", top: 4, right: "calc(50% - 22px)", background: C.danger, color: "#fff", borderRadius: 10, padding: "0 5px", fontSize: 10, fontWeight: 800, minWidth: 16, textAlign: "center" }}>{t.badge}</span>}
                </button>
              ))}
            </div>
          )}
          {(tela === "novo" || tela === "prontuario") && (
            <div style={{ paddingBottom: 10 }}>
              <button onClick={() => setTela("lista")} style={{ background: "none", border: "none", color: "#94A3B8", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>← Voltar</button>
            </div>
          )}
        </div>
      </div>

      {/* CONTEÚDO */}
      <div style={{ padding: "18px 12px 80px" }}>
        {tela === "lista" && <ListaAtendimentos atendimentos={atendimentos} onVerPaciente={handleVerPaciente} onVerGaleria={p => { setProntuarioSel(p); setTela("galeria"); }} />}
        {tela === "novo" && <FormAtendimento prefill={prefillNovo} onSalvar={() => { setPrefillNovo(null); handleSalvar(); }} onCancelar={() => { setPrefillNovo(null); setTela("lista"); }} />}
        {tela === "prontuario" && <ProntuarioPaciente prontuario={prontuarioSel} atendimentos={atendimentos} onVoltar={() => setTela("lista")} onDeletar={handleDeletar} onVerGaleria={() => setTela("galeria")} onNovoAtendimento={handleNovoAtendimentoPaciente} onDeletarPaciente={handleDeletarPaciente} />}
        {tela === "galeria" && <GaleriaPaciente prontuario={prontuarioSel} atendimentos={atendimentos} onVoltar={() => setTela("prontuario")} />}
        {tela === "relatorio" && <Relatorio atendimentos={atendimentos} />}
        {tela === "alertas" && <PainelAlertas atendimentos={atendimentos} onVerPaciente={handleVerPaciente} />}
        {tela === "calendario" && <Calendario atendimentos={atendimentos} onVerPaciente={handleVerPaciente} />}
      </div>

      {/* TOAST */}
      {toast && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: toast.color, color: "#fff", padding: "13px 26px", borderRadius: 30, fontWeight: 700, fontSize: 14, boxShadow: "0 4px 20px rgba(0,0,0,.25)", zIndex: 999, whiteSpace: "nowrap" }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}




function TelaEmail({ onVerificado }) {
  const [email, setEmail] = useState("");
  const [verificando, setVerificando] = useState(false);
  const [erro, setErro] = useState("");

  async function handleVerificar() {
    const valor = email.trim();
    if (!valor || !valor.includes("@")) { setErro("Digite um e-mail válido."); return; }
    setVerificando(true);
    setErro("");
    try {
      const resultado = await dbVerificarEmail(valor);
      if (resultado.ok) {
        sessionStorage.setItem("ec_email_auth", "ok");
        sessionStorage.setItem("ec_email", valor.toLowerCase());
        onVerificado();
      } else if (resultado.motivo === "nao_encontrado") {
        setErro("E-mail não encontrado. Verifique se digitou corretamente ou entre em contato para liberar o acesso.");
      } else if (resultado.motivo === "inativo") {
        setErro("Este acesso está inativo. Entre em contato para reativar sua licença.");
      } else if (resultado.motivo === "expirado") {
        setErro(`Sua licença expirou em ${fmtDate(resultado.validade)}. Entre em contato para renovar.`);
      } else {
        setErro("Não foi possível verificar o acesso. Tente novamente.");
      }
    } catch (e) {
      setErro("Erro de conexão. Verifique sua internet e tente novamente.");
    }
    setVerificando(false);
  }

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#1E293B 0%,#0F172A 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:56,marginBottom:8}}>🩺</div>
        <div style={{color:"#fff",fontWeight:800,fontSize:26}}>Estoma<span style={{color:"#0F5C56"}}>Care</span></div>
        <div style={{color:"#94A3B8",fontSize:12,marginTop:4}}>Curativos & Estomaterapia · CHPBG</div>
      </div>
      <div style={{background:"rgba(255,255,255,0.08)",borderRadius:20,padding:"26px 22px",width:"100%",maxWidth:340,border:"1px solid rgba(255,255,255,0.15)"}}>
        <div style={{textAlign:"center",color:"#fff",fontWeight:600,fontSize:15,marginBottom:6}}>✉️ Verificação de Acesso</div>
        <div style={{textAlign:"center",color:"#94A3B8",fontSize:12,marginBottom:18,lineHeight:1.5}}>Digite o e-mail cadastrado para liberar o uso do EstomaCare</div>
        <input
          type="email"
          value={email}
          onChange={e => { setEmail(e.target.value); setErro(""); }}
          onKeyDown={e => e.key === "Enter" && !verificando && handleVerificar()}
          placeholder="seu-email@exemplo.com"
          autoCapitalize="none"
          style={{ width:"100%", padding:"13px 14px", borderRadius:10, border:"1.5px solid rgba(255,255,255,0.25)",
            background:"rgba(255,255,255,0.06)", color:"#fff", fontSize:15, outline:"none", boxSizing:"border-box", marginBottom:14 }}
        />
        {erro && (
          <div style={{background:"rgba(147,65,63,0.25)",border:"1px solid #93413F",borderRadius:8,padding:"10px 12px",color:"#F3C6C6",fontSize:12,marginBottom:14,lineHeight:1.4}}>
            {erro}
          </div>
        )}
        <button onClick={handleVerificar} disabled={verificando}
          style={{ width:"100%", padding:"13px", borderRadius:10, border:"none", background: verificando ? "#3F5064" : "#0F5C56",
            color:"#fff", fontWeight:700, fontSize:15, cursor: verificando ? "default" : "pointer" }}>
          {verificando ? "Verificando..." : "Verificar Acesso"}
        </button>
      </div>
      <div style={{color:"#475569",fontSize:10,marginTop:24,textAlign:"center"}}>
        Não tem acesso ainda? Entre em contato para adquirir sua licença.
      </div>
    </div>
  );
}

const PIN_CORRETO = "120626";

function TelaPin({ onAutenticar }) {
  const [pin, setPin] = useState("");
  const [erro, setErro] = useState(false);
  const [tentativas, setTentativas] = useState(0);
  const [bloqueado, setBloqueado] = useState(false);
  const [contador, setContador] = useState(0);

  useEffect(() => {
    if (bloqueado && contador > 0) { const t = setTimeout(() => setContador(c=>c-1),1000); return ()=>clearTimeout(t); }
    if (bloqueado && contador === 0) setBloqueado(false);
  }, [bloqueado, contador]);

  function handleDigito(d) {
    if (bloqueado || pin.length >= 6) return;
    const novo = pin + d; setPin(novo); setErro(false);
    if (novo.length === 6) setTimeout(() => verificar(novo), 200);
  }
  function verificar(p) {
    if (p === PIN_CORRETO) { sessionStorage.setItem("ec_auth","ok"); onAutenticar(); }
    else { const t=tentativas+1; setTentativas(t); setErro(true); setPin(""); if(t>=5){setBloqueado(true);setContador(30);setTentativas(0);} }
  }
  function handleApagar() { setPin(p=>p.slice(0,-1)); setErro(false); }
  const digitos=[["1","2","3"],["4","5","6"],["7","8","9"],["","0","⌫"]];
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#1E293B 0%,#0F172A 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>

        <div style={{fontSize:64,marginBottom:8}}>🩺</div>

        <div style={{color:"#94A3B8",fontSize:12,marginTop:4}}>Curativos & Estomaterapia · CHPBG</div>
      </div>
      <div style={{background:"rgba(255,255,255,0.08)",borderRadius:24,padding:"28px 24px",width:"100%",maxWidth:320,border:"1px solid rgba(255,255,255,0.15)"}}>
        <div style={{textAlign:"center",color:"#fff",fontWeight:600,fontSize:15,marginBottom:20}}>🔐 Digite seu PIN de acesso</div>
        <div style={{display:"flex",justifyContent:"center",gap:12,marginBottom:24}}>
          {[0,1,2,3,4,5].map(i=>(
            <div key={i} style={{width:14,height:14,borderRadius:"50%",
              background:i<pin.length?(erro?"#93413F":"#0F5C56"):"rgba(255,255,255,0.25)",
              border:`2px solid ${i<pin.length?(erro?"#93413F":"#0F5C56"):"rgba(255,255,255,0.4)"}`,transition:"all .15s"}}/>
          ))}
        </div>
        {erro&&<div style={{background:"rgba(147,65,63,0.2)",border:"1px solid #93413F",borderRadius:8,padding:"8px 12px",textAlign:"center",color:"#93413F",fontSize:12,marginBottom:16,fontWeight:600}}>PIN incorreto! {5-tentativas} tentativa(s)</div>}
        {bloqueado&&<div style={{background:"rgba(147,65,63,0.2)",border:"1px solid #93413F",borderRadius:8,padding:"10px 12px",textAlign:"center",color:"#93413F",fontSize:12,marginBottom:16,fontWeight:600}}>🔒 Aguarde {contador}s</div>}
        <div style={{display:"grid",gap:10}}>
          {digitos.map((linha,i)=>(
            <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              {linha.map((d,j)=>(
                <button key={j} onClick={()=>d==="⌫"?handleApagar():d!==""?handleDigito(d):null} disabled={bloqueado}
                  style={{height:58,borderRadius:14,background:d===""?"transparent":d==="⌫"?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.12)",
                    border:d===""?"none":"1px solid rgba(255,255,255,0.2)",color:"#fff",fontSize:d==="⌫"?20:22,fontWeight:600,cursor:d===""?"default":"pointer",opacity:bloqueado?0.4:1}}>{d}</button>
              ))}
            </div>
          ))}
        </div>
      </div>
      <div style={{color:"#475569",fontSize:10,marginTop:24}}>EstomaCare v4.0 · 2025</div>
    </div>
  );
}

function AppComAuth() {
  const [emailOk, setEmailOk] = useState(sessionStorage.getItem("ec_email_auth")==="ok");
  const [autenticado, setAutenticado] = useState(sessionStorage.getItem("ec_auth")==="ok");
  if (!emailOk) return React.createElement(TelaEmail, {onVerificado:()=>setEmailOk(true)});
  if (!autenticado) return React.createElement(TelaPin, {onAutenticar:()=>setAutenticado(true)});
  return React.createElement(App);
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AppComAuth));

  </script>
  <script>
    if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
    let deferredPrompt=null;
    window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').classList.add('show');});
    document.getElementById('btn-install')?.addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('install-banner').classList.remove('show');});
    document.getElementById('btn-close')?.addEventListener('click',()=>{document.getElementById('install-banner').classList.remove('show');});
    const obs=new MutationObserver(()=>{const r=document.getElementById('root');if(r&&r.children.length>0){obs.disconnect();setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),700);}},600);}});
    obs.observe(document.getElementById('root'),{childList:true,subtree:true});
    setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),700);}},6000);
  </script>
